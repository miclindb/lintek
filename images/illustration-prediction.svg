<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a"/>

  <!-- Title -->
  <text x="70" y="44" fill="#f1f5f9" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600">Etterspørselsprognose</text>
  <text x="70" y="62" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="11">AI-basert prediksjon · Logistikkbransjen</text>

  <!-- Horizontal grid lines -->
  <g stroke="#1e293b" stroke-width="1">
    <line x1="70" y1="95"  x2="770" y2="95"/>
    <line x1="70" y1="160" x2="770" y2="160"/>
    <line x1="70" y1="225" x2="770" y2="225"/>
    <line x1="70" y1="290" x2="770" y2="290"/>
    <line x1="70" y1="355" x2="770" y2="355"/>
    <line x1="70" y1="390" x2="770" y2="390"/>
  </g>

  <!-- Y-axis labels -->
  <g fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="11" text-anchor="end">
    <text x="62" y="99">500</text>
    <text x="62" y="164">400</text>
    <text x="62" y="229">300</text>
    <text x="62" y="294">200</text>
    <text x="62" y="359">100</text>
  </g>

  <!-- X-axis labels -->
  <g fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="11" text-anchor="middle">
    <text x="120" y="410">Jan</text>
    <text x="210" y="410">Feb</text>
    <text x="300" y="410">Mar</text>
    <text x="390" y="410">Apr</text>
    <text x="480" y="410">Mai</text>
    <text x="570" y="410">Jun</text>
    <text x="660" y="410">Jul</text>
    <text x="750" y="410">Aug</text>
  </g>

  <!-- Confidence band (forecast zone) -->
  <polygon
    points="480,225 570,198 660,175 750,158  750,210 660,228 570,258 480,275"
    fill="rgba(56,189,248,0.10)"/>

  <!-- Historical line -->
  <polyline
    points="120,320 210,275 300,295 390,230 480,240"
    fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Forecast line (dashed) -->
  <polyline
    points="480,240 570,218 660,195 750,178"
    fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-dasharray="9,5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Data dots -->
  <circle cx="120" cy="320" r="4.5" fill="#2563eb"/>
  <circle cx="210" cy="275" r="4.5" fill="#2563eb"/>
  <circle cx="300" cy="295" r="4.5" fill="#2563eb"/>
  <circle cx="390" cy="230" r="4.5" fill="#2563eb"/>
  <circle cx="480" cy="240" r="6"   fill="#38bdf8" stroke="#0f172a" stroke-width="2"/>
  <circle cx="570" cy="218" r="4.5" fill="#38bdf8" opacity="0.7"/>
  <circle cx="660" cy="195" r="4.5" fill="#38bdf8" opacity="0.7"/>
  <circle cx="750" cy="178" r="4.5" fill="#38bdf8" opacity="0.7"/>

  <!-- "Nå" divider -->
  <line x1="480" y1="80" x2="480" y2="390" stroke="#334155" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="480" y="76" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="11" text-anchor="middle">Nå</text>
  <text x="620" y="76" fill="#38bdf8" font-family="Inter,system-ui,sans-serif" font-size="11" text-anchor="middle">Prognose →</text>

  <!-- Legend -->
  <g transform="translate(70,430)">
    <line x1="0" y1="5" x2="20" y2="5" stroke="#2563eb" stroke-width="2.5"/>
    <circle cx="10" cy="5" r="3.5" fill="#2563eb"/>
    <text x="26" y="9" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">Historisk data</text>
    <line x1="145" y1="5" x2="165" y2="5" stroke="#38bdf8" stroke-width="2.5" stroke-dasharray="6,3"/>
    <text x="171" y="9" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">AI-prognose</text>
    <rect x="290" y="0" width="14" height="10" rx="2" fill="rgba(56,189,248,0.2)"/>
    <text x="310" y="9" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">Konfidensintervall</text>
  </g>
</svg>
