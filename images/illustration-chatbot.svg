<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a"/>

  <!-- Left panel: bot stats -->
  <rect x="20" y="20" width="210" height="410" rx="10" fill="#1e293b"/>

  <!-- Bot avatar -->
  <circle cx="125" cy="95" r="38" fill="#1e3a5f"/>
  <circle cx="125" cy="95" r="28" fill="#2563eb"/>
  <!-- Eyes -->
  <rect x="112" y="85" width="8" height="8" rx="2" fill="#fff"/>
  <rect x="130" y="85" width="8" height="8" rx="2" fill="#fff"/>
  <!-- Smile -->
  <path d="M116 104 Q125 112 134 104" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>

  <text x="125" y="152" fill="#f1f5f9" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">LinBot</text>
  <text x="125" y="168" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10" text-anchor="middle">AI Kundesupport</text>

  <!-- Stat boxes -->
  <rect x="35" y="188" width="180" height="58" rx="7" fill="#0f172a"/>
  <text x="125" y="208" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10" text-anchor="middle">Løste henvendelser</text>
  <text x="125" y="234" fill="#38bdf8" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700" text-anchor="middle">94%</text>

  <rect x="35" y="258" width="180" height="58" rx="7" fill="#0f172a"/>
  <text x="125" y="278" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10" text-anchor="middle">Gj.snitt responstid</text>
  <text x="125" y="304" fill="#22c55e" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700" text-anchor="middle">1.2s</text>

  <rect x="35" y="328" width="180" height="58" rx="7" fill="#0f172a"/>
  <text x="125" y="348" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10" text-anchor="middle">Tilgjengelighet</text>
  <text x="125" y="374" fill="#22c55e" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700" text-anchor="middle">24/7</text>

  <!-- Right panel: chat window -->
  <rect x="248" y="20" width="532" height="410" rx="10" fill="#1e293b"/>

  <!-- Chat header -->
  <rect x="248" y="20" width="532" height="54" rx="10" fill="#164e63"/>
  <rect x="248" y="54" width="532" height="20" fill="#164e63"/>
  <circle cx="285" cy="47" r="16" fill="#0e7490"/>
  <text x="285" y="51" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">L</text>
  <text x="310" y="42" fill="#f1f5f9" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">LinBot</text>
  <text x="310" y="57" fill="#67e8f9" font-family="Inter,system-ui,sans-serif" font-size="10">● Online nå</text>

  <!-- Bot message 1 -->
  <rect x="265" y="90" width="295" height="48" rx="12" fill="#1d4ed8"/>
  <text x="282" y="110" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="12">Hei! Hvordan kan jeg hjelpe</text>
  <text x="282" y="128" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="12">deg i dag?</text>

  <!-- User message 1 -->
  <rect x="445" y="152" width="310" height="48" rx="12" fill="#334155"/>
  <text x="462" y="172" fill="#f1f5f9" font-family="Inter,system-ui,sans-serif" font-size="12">Jeg trenger hjelp med</text>
  <text x="462" y="190" fill="#f1f5f9" font-family="Inter,system-ui,sans-serif" font-size="12">bestilling #4821</text>

  <!-- Bot message 2 -->
  <rect x="265" y="214" width="340" height="64" rx="12" fill="#1d4ed8"/>
  <text x="282" y="234" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="12">Fant bestilling #4821!</text>
  <text x="282" y="252" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="12">Status: Under forsendelse 📦</text>
  <text x="282" y="270" fill="#bfdbfe" font-family="Inter,system-ui,sans-serif" font-size="11">Forventet levering: i morgen</text>

  <!-- User message 2 -->
  <rect x="510" y="292" width="250" height="34" rx="12" fill="#334155"/>
  <text x="528" y="314" fill="#f1f5f9" font-family="Inter,system-ui,sans-serif" font-size="12">Takk, det var raskt! 👍</text>

  <!-- Bot message 3 -->
  <rect x="265" y="340" width="270" height="34" rx="12" fill="#1d4ed8"/>
  <text x="282" y="362" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="12">Bare hyggelig! Ha en fin dag 😊</text>

  <!-- Typing indicator -->
  <text x="268" y="398" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">LinBot skriver...</text>
  <circle cx="357" cy="394" r="4" fill="#475569"/>
  <circle cx="370" cy="394" r="4" fill="#64748b"/>
  <circle cx="383" cy="394" r="4" fill="#334155"/>

  <!-- Input bar -->
  <rect x="265" y="407" width="495" height="12" rx="6" fill="#0f172a"/>
</svg>
